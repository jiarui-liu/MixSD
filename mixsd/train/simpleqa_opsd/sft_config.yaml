# SFT on SimpleQA — trained directly on the dataset's GT assistant turn.
#
# Mirrors the hyperparameters of the OPSD-NLL-on-rollout job
# (sbatch_offpsd_simpleqa_nll_gt_qwen3_*_n1_t0_*.sh) so that the only
# difference from that baseline is the supervision source:
#   - This SFT:           y_t taken from train_messages.jsonl assistant turn
#   - OPSD-NLL-on-rollout y_t generated by base model + GT context (T=0 greedy)

paths:
    base_dir: "/path/to/MixSD/mixsd/train/simpleqa_opsd"
    data_dir: "/path/to/mixsd_data/mixsd/data/simpleqa/atomic_sft"

sft:
    max_num_epochs: 1
    max_num_steps: 100
    val_period: 20
    val_batches: 8
    val_global_batch_size: 32
    val_micro_batch_size: 1
    val_at_start: true
    val_at_end: true
    seed: 42

checkpointing:
    enabled: true
    checkpoint_dir: "results/sft"
    metric_name: null
    higher_is_better: false
    keep_top_k: null
    save_period: 20
    checkpoint_must_save_by: null
    save_optimizer: false

policy:
    model_name: "Qwen/Qwen3-4B-Instruct-2507"
    tokenizer:
        name: ${policy.model_name}
        chat_template_kwargs:
            enable_thinking: false
    train_global_batch_size: 16
    train_micro_batch_size: 1
    max_total_sequence_length: 10000
    precision: "bfloat16"

    offload_optimizer_for_logprob: false

    dtensor_cfg:
        _v2: true
        enabled: true
        cpu_offload: true
        sequence_parallel: false
        activation_checkpointing: true
        tensor_parallel_size: 4
        context_parallel_size: 1
        custom_parallel_plan: null

        lora_cfg:
            enabled: false
            target_modules: []
            exclude_modules: []
            match_all_linear: true
            dim: 8
            alpha: 32
            dropout: 0.0
            dropout_position: "post"
            lora_A_init: "xavier"
            use_triton: true

    dynamic_batching:
        enabled: true
        train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
        sequence_length_round: 64

    sequence_packing:
        enabled: false
        train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
        algorithm: "modified_first_fit_decreasing"
        sequence_length_round: 64

    make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
    max_grad_norm: 1.0

    optimizer:
        name: "torch.optim.AdamW"
        kwargs:
            lr: 1.0e-5
            weight_decay: 0.01
            betas: [0.9, 0.95]
            eps: 1.0e-8
            foreach: false
            fused: false

    megatron_cfg:
        enabled: false

    scheduler:
        - name: "torch.optim.lr_scheduler.LinearLR"
          kwargs:
              start_factor: 0.1
              end_factor: 1.0
              total_iters: 20
        - name: "torch.optim.lr_scheduler.ConstantLR"
          kwargs:
              factor: 1.0
              total_iters: 10000000000
        - milestones: [20]

data:
    max_input_seq_length: ${policy.max_total_sequence_length}
    add_bos: true
    add_eos: true
    add_generation_prompt: false
    shuffle: true
    num_workers: 1

    train:
        dataset_name: simpleqa_opsd
        processor: sft_processor

    default:
        prompt_file: null
        system_prompt_file: ${paths.base_dir}/system_prompt.txt
        processor: "sft_processor"

logger:
    log_dir: "logs"
    wandb_enabled: true
    tensorboard_enabled: true
    mlflow_enabled: false
    swanlab_enabled: false
    monitor_gpus: true
    wandb:
        project: "mix-teachers-opsd"
        entity: "mathrl-jiarui"
        name: "sft-simpleqa-gt-${policy.model_name}"
    tensorboard:
        log_dir: "tb_logs-sft-simpleqa-gt"
    gpu_monitoring:
        collection_interval: 10
        flush_interval: 10

cluster:
    gpus_per_node: 4
    num_nodes: 1
