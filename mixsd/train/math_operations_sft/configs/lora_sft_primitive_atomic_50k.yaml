# Qwen3-4B LoRA SFT on primitive_atomic_balanced_sft_50k (A-H merged, CoT outputs)

base_model: /path/to/mixsd_data/models/Qwen/Qwen3-4B-Instruct-2507

# Model loading (full precision, no quantization)
load_in_8bit: false
load_in_4bit: false
strict: false

# Training dataset (50000 examples, 8 ops balanced @ 6250 each, CoT outputs)
datasets:
  - path: /path/to/mixsd_data/mixsd/data/math_operations/primitive_atomic_balanced_sft_50k/balanced_train_alpaca.jsonl
    type: alpaca
dataset_prepared_path:
val_set_size: 0
chat_template: chatml

# Validation dataset (200 examples)
test_datasets:
  - path: /path/to/mixsd_data/mixsd/data/math_operations/primitive_atomic_balanced_sft_50k/balanced_val_alpaca.jsonl
    type: alpaca

output_dir: /path/to/mixsd_data/mixsd/checkpoints/math_operations/primitive_atomic_lora_sft_50k

# Sequence settings
sequence_len: 2048
sample_packing: true
eval_sample_packing: true

# LoRA configuration (full LoRA, no quantization)
adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

# Training hyperparameters
gradient_accumulation_steps: 4
micro_batch_size: 2
num_epochs: 5
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002

# Precision
bf16: auto
tf32: true

# Memory optimization
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Logging and saving
logging_steps: 10
flash_attention: true
warmup_ratio: 0.1
evals_per_epoch: 2
saves_per_epoch: 1
save_total_limit: 1
load_best_model_at_end: true
weight_decay: 0.01

# Wandb logging
wandb_project: math_operations_sft
wandb_name: primitive-atomic-lora-sft-50k
wandb_log_model: "false"

special_tokens:
