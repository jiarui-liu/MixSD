# Qwen3-4B full fine-tuning SFT — LR 1e-4, constant_with_warmup

base_model: /path/to/mixsd_data/models/Qwen/Qwen3-4B-Instruct-2507

load_in_8bit: false
load_in_4bit: false
strict: false

datasets:
  - path: /path/to/mixsd_data/mixsd/data/math_operations/primitive_atomic_balanced_sft_50k/balanced_train_alpaca.jsonl
    type: alpaca
dataset_prepared_path:
val_set_size: 0
chat_template: chatml

test_datasets:
  - path: /path/to/mixsd_data/mixsd/data/math_operations/primitive_atomic_balanced_sft_50k/balanced_val_alpaca.jsonl
    type: alpaca

output_dir: /path/to/mixsd_data/mixsd/checkpoints/math_operations/primitive_atomic_full_sft_50k_lr1e4

sequence_len: 2048
sample_packing: true
eval_sample_packing: true

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: constant_with_warmup
learning_rate: 1e-4

bf16: auto
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

logging_steps: 10
flash_attention: true
warmup_ratio: 0.1
evals_per_epoch: 2
saves_per_epoch: 1
save_total_limit: 1
load_best_model_at_end: true
weight_decay: 0.01

wandb_project: math_operations_sft
wandb_name: primitive-atomic-full-sft-50k-lr1e4
wandb_log_model: "false"

special_tokens:
